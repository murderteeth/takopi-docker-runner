name: takopi-docker-runner

services:
  takopi:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: takopi-docker-runner:latest
    # Build-only: live bots run from sibling instance repos (see README).
    # This service exists for building the base image and ad-hoc shells.
    restart: "no"
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ../home:/home/takopi
      - ../workspace:/workspace
    environment:
      HOME: /home/takopi
      TERM: xterm-256color
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: takopi
